<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#f7bc5e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1d1107" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9943a"/>
      <stop offset="100%" stop-color="#f7bc5e"/>
    </linearGradient>
    <linearGradient id="goldv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7bc5e"/>
      <stop offset="100%" stop-color="#c9943a"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#1d1107" stroke="url(#gold)" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Inner glow -->
  <circle cx="60" cy="70" r="45" fill="url(#glow)"/>

  <!-- Lantern glow light at bottom -->
  <ellipse cx="60" cy="90" rx="18" ry="8" fill="#f7bc5e" opacity="0.15"/>

  <!-- Open Book (Quran) -->
  <!-- Left page -->
  <path d="M22 75 Q22 58 38 55 L58 52 L58 82 Q42 84 28 87 Q22 85 22 75Z" fill="none" stroke="url(#gold)" stroke-width="1.8" opacity="0.9"/>
  <!-- Right page -->
  <path d="M98 75 Q98 58 82 55 L62 52 L62 82 Q78 84 92 87 Q98 85 98 75Z" fill="none" stroke="url(#gold)" stroke-width="1.8" opacity="0.9"/>
  <!-- Book spine -->
  <line x1="60" y1="52" x2="60" y2="82" stroke="url(#goldv)" stroke-width="2.5"/>
  <!-- Book bottom arc -->
  <path d="M28 87 Q60 92 92 87" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
  <!-- Lines on left page -->
  <line x1="31" y1="63" x2="53" y2="61" stroke="#c9943a" stroke-width="0.8" opacity="0.5"/>
  <line x1="30" y1="67" x2="53" y2="65" stroke="#c9943a" stroke-width="0.8" opacity="0.5"/>
  <line x1="30" y1="71" x2="53" y2="70" stroke="#c9943a" stroke-width="0.8" opacity="0.4"/>
  <!-- Lines on right page -->
  <line x1="67" y1="61" x2="89" y2="63" stroke="#c9943a" stroke-width="0.8" opacity="0.5"/>
  <line x1="67" y1="65" x2="90" y2="67" stroke="#c9943a" stroke-width="0.8" opacity="0.5"/>
  <line x1="67" y1="70" x2="90" y2="71" stroke="#c9943a" stroke-width="0.8" opacity="0.4"/>

  <!-- Crescent Moon -->
  <path d="M60 12 Q75 14 78 26 Q68 22 60 26 Q52 22 42 26 Q45 14 60 12Z" fill="url(#gold)" opacity="0.9"/>
  <!-- Crescent inner cutout -->
  <path d="M60 14 Q73 16 75 25 Q67 21 60 24 Q53 21 45 25 Q47 16 60 14Z" fill="#1d1107" opacity="0.85"/>
  <!-- Crescent final -->
  <path d="M55 13 Q72 15 75 26 Q65 20 58 25 Q66 18 55 13Z" fill="url(#gold)" opacity="0.95"/>

  <!-- Star next to crescent -->
  <polygon points="82,18 83.2,22 87,22 84.2,24.5 85.3,28.5 82,26 78.7,28.5 79.8,24.5 77,22 80.8,22" fill="url(#gold)" opacity="0.8" transform="scale(0.65) translate(44,10)"/>

  <!-- Lantern body -->
  <rect x="53" y="34" width="14" height="16" rx="2" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.85"/>
  <!-- Lantern top cap -->
  <path d="M51 34 L60 28 L69 34Z" fill="url(#gold)" opacity="0.7"/>
  <!-- Lantern bottom cap -->
  <path d="M53 50 L55 53 L65 53 L67 50Z" fill="url(#gold)" opacity="0.7"/>
  <!-- Lantern handle -->
  <path d="M60 28 L60 24" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
  <!-- Lantern glow inside -->
  <rect x="55" y="36" width="10" height="12" rx="1" fill="#f7bc5e" opacity="0.2"/>
  <!-- Lantern cross bars -->
  <line x1="53" y1="41" x2="67" y2="41" stroke="#c9943a" stroke-width="0.8" opacity="0.5"/>
  <line x1="60" y1="34" x2="60" y2="50" stroke="#c9943a" stroke-width="0.8" opacity="0.5"/>

  <!-- Ornamental dots top arc -->
  <circle cx="38" cy="35" r="1.2" fill="#c9943a" opacity="0.6"/>
  <circle cx="30" cy="44" r="1" fill="#c9943a" opacity="0.4"/>
  <circle cx="82" cy="35" r="1.2" fill="#c9943a" opacity="0.6"/>
  <circle cx="90" cy="44" r="1" fill="#c9943a" opacity="0.4"/>

  <!-- Outer ring ornament -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.25" stroke-dasharray="3,5"/>
</svg>